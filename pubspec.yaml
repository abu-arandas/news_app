name: news_app
description: A news app built with flutter and news api endpoint.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.2
  
  # Networking
  dio: ^5.3.2
  internet_connection_checker: ^3.0.1
  
  # State Management
  provider: ^6.0.5
  
  # Local Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.1
  
  # Utils
  url_launcher: ^6.1.14
  intl: ^0.20.2
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.11.0
  
flutter_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/favicon.png'
  min_sdk_android: 21

flutter:

  uses-material-design: true

  assets:
    - assets/favicon.png